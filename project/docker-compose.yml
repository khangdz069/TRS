services:
  # Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: trs_database
    environment:
      POSTGRES_DB: trs_db
      POSTGRES_USER: trs_user
      POSTGRES_PASSWORD: trs_pass
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trs_user -d trs_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend Service (Spring Boot)
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: trs_backend
    ports:
      - "5102:5102"
    environment:
      - POSTGRES_DB=trs_db
      - POSTGRES_USER=trs_user
      - POSTGRES_PASSWORD=trs_pass
      - DB_HOST=db
      - DB_PORT=5432
      - GRADER_URL=http://grader:5103/api/grader
      - MODEL_URL=http://model:5104/api/model/recommend
      - JWT_SECRET=dev-secret-key-trs-rebuild
      - UPLOAD_DIR=/app/uploads
    depends_on:
      db:
        condition: service_healthy
      grader:
        condition: service_started
      model:
        condition: service_started
    volumes:
      - ../backend/uploads:/app/uploads
    restart: unless-stopped

  # Grader Service (Spring Boot)
  grader:
    build:
      context: ..
      dockerfile: grader/Dockerfile
    container_name: trs_grader
    ports:
      - "5103:5103"
    restart: unless-stopped

  # Model Service (Python black-box recommendation model)
  model:
    build:
      context: ..
      dockerfile: model-python/Dockerfile
    container_name: trs_model
    ports:
      - "5104:5104"
    restart: unless-stopped

  # Frontend Service (Next.js + TypeScript)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: trs_frontend
    ports:
      - "3100:3100"
    restart: unless-stopped

volumes:
  postgres_data:
