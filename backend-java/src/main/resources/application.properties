server.port=${PORT:5102}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:55432}/${POSTGRES_DB:trs_db}
spring.datasource.username=${POSTGRES_USER:trs_user}
spring.datasource.password=${POSTGRES_PASSWORD:trs_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

trs.jwt.secret=${JWT_SECRET:dev-secret-key-trs-rebuild}
trs.grader.url=${GRADER_URL:http://localhost:5103/api/grader}
trs.upload-dir=${UPLOAD_DIR:uploads}
